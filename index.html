<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="calculator">
        <div id="visor">

        </div>
        <div id="inputs">
            <div id="numbers-btn">
                <button id="delete" class="btn-inputs">DEL</button>
                <button id="clear" class="btn-inputs">C</button>
                <button id="rest" class="btn-inputs">%</button>
                <button id="nine" class="btn-inputs">9</button>
                <button id="eight" class="btn-inputs">8</button>
                <button id="seven" class="btn-inputs">7</button>
                <button id="six" class="btn-inputs">6</button>
                <button id="five" class="btn-inputs">5</button>
                <button id="four" class="btn-inputs">4</button>
                <button id="three" class="btn-inputs">3</button>
                <button id="two" class="btn-inputs">2</button>
                <button id="one" class="btn-inputs">1</button>
                <button id="zero">0</button>
                <button id="point" class="btn-inputs">.</button>
            </div>

            <div id="operators-btn">
                <button id="divide" class="btn-ops">/</button>
                <button id="multiply" class="btn-ops">x</button>
                <button id="subtract" class="btn-ops">-</button>
                <button id="add" class="btn-ops">+</button>
                <button id="equals" class="btn-ops">=</button>
            </div>
            
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
